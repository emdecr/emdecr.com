name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # Standalone output doesn't include static assets or public dir — copy them in
      - name: Prepare bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp -r data .next/standalone/data
          cp -r content .next/standalone/content

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync to server
        run: |
          rsync -avz --delete \
            --exclude '.env*' \
            --exclude 'ecosystem.config.js' \
            -e "ssh -i ~/.ssh/deploy_key -p 2222" \
            .next/standalone/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/emdecr.com/

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'export NVM_DIR="$HOME/.nvm" && \. "$NVM_DIR/nvm.sh" && pm2 restart edc 2>/dev/null || pm2 start ~/emdecr.com/server.js --name edc && pm2 save'
